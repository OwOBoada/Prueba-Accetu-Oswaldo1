spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/franchise_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:franchise_user}
    password: ${SPRING_DATASOURCE_PASSWORD:franchise_password}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
    show-sql: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
    
logging:
  level:
    root: INFO
    com.accenture.franchiseapi: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

